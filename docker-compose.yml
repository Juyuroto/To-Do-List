services:
  database:
    container_name: todo_database
    image: postgres:12.8
    restart: always
    environment:
      - POSTGRES_USER=${PostgreUser}
      - POSTGRES_PASSWORD=${PostgrePassword}
      - POSTGRES_DB=${PostgreDB}
    ports:
      - ${PortDB}:5432
    volumes:
      - db:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d/:z
    networks:
      - todo_network
      
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: todo_backend
    restart: always
    ports:
      - "${BACKEND_PORT}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_USER: ${PostgreUser}
      DB_HOST: ${Host}
      DB_NAME: ${PostgreDB}
      DB_PASSWORD: ${PostgrePassword}
      DB_PORT: ${PortDB}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - todo_network

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - todo_network