services:
  database:
    container_name: database
    image: postgres:12.8
    restart: always
    environment:
      - POSTGRES_USER=${PostgreUser}
      - POSTGRES_PASSWORD=${PostgrePassword}
      - POSTGRES_DB=${PostgreDB}
    ports:
      - ${PortDB}:5432
    volumes:
      - db:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d/:z

volumes:
  db:
