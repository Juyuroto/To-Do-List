services:
  database:
    container_name: todo_database
    image: postgres:12.8
    restart: always
    environment:
      - POSTGRES_USER=${PostgreUser}
      - POSTGRES_PASSWORD=${PostgrePassword}
      - POSTGRES_DB=${PostgreDB}
    ports:
      - ${PostgrePort}:5432
    volumes:
      - db:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d/:z
    networks:
      - todo_network
      
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: todo_backend
    restart: always
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - PostgreUser=${PostgreUser}
      - PostgrePassword=${PostgrePassword}
      - PostgreDB=${PostgreDB}
      - PostgrePort=5432
      - PostgreHost=${PostgreHost}
    depends_on:
      - database
    networks:
      - todo_network

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:5030"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - todo_network

networks:
  todo_network:
    
volumes:
  db: